<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Joystick Pacman IA</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main>
    <header class="hero">
      <h1>Controle Pacman por Gestos</h1>
      <p id="status" class="status">Carregando inteligência artificial...</p>
    </header>

    <section class="fullscreen-container">
      <div class="video-wrapper">
        <video id="webcam" autoplay playsinline muted></video>
        <canvas id="overlay"></canvas>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.20.0/dist/tf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/hand-pose-detection@2.0.1/dist/hand-pose-detection.min.js"></script>
  
  <script src="app.js"></script>
</body>
</html>
